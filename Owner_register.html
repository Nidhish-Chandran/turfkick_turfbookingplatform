<!DOCTYPE html>
<html>
<head>
<title>TurfKick - Owner Registration</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
background: linear-gradient(135deg,#1f4037,#99f2c8);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* MAIN BOX */
.wrapper{
width:850px;
height:520px;
display:flex;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 50px rgba(0,0,0,0.6);
}

/* LEFT IMAGE */
.left{
width:50%;
background:url('https://images.unsplash.com/photo-1508098682722-e99c643e7f0b') center/cover;
position:relative;
}

.left::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);
}

/* RIGHT FORM */
.right{
width:50%;
background: rgba(255,255,255,0.15);
backdrop-filter: blur(20px);
padding:30px;
overflow-y:auto;
}

/* TITLE */
h2{
text-align:center;
margin-bottom:20px;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:none;
outline:none;
}

/* FILE INPUT */
.file{
background:white;
color:black;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:20px;
border:none;
background:white;
color:#1f4037;
font-weight:bold;
cursor:pointer;
}

/* BACK LINK */
.back{
text-align:center;
margin-top:10px;
cursor:pointer;
opacity:0.8;
}
/* SCROLLBAR - Chrome, Edge, Safari */
::-webkit-scrollbar {
width: 8px;
}

::-webkit-scrollbar-track {
background: transparent;
}

::-webkit-scrollbar-thumb {
background: linear-gradient(135deg,#1f4037,#99f2c8);
border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
background: linear-gradient(135deg,#145a4a,#7be0b5);
}

/* Firefox */
* {
scrollbar-width: thin;
scrollbar-color: #99f2c8 transparent;
}

</style>

</head>

<body>

<div class="wrapper">

<!-- LEFT IMAGE -->
<div class="left"></div>

<!-- RIGHT FORM -->
<div class="right">

<h2>Owner Registration</h2>

<form>

<input type="text" placeholder="Owner Name" required>

<input type="text" placeholder="Turf Name" required>

<input type="text" placeholder="Phone or Email" required>

<label>Aadhaar Upload</label>
<input type="file" class="file" required>

<label>Turf Operation License</label>
<input type="file" class="file" required>

<label>Turf Images</label>
<input type="file" class="file" multiple required>

<button type="submit">Register</button>

</form>

<div class="back" onclick="goBack()">← Back to Login</div>

</div>

</div>

<script>
function goBack(){
window.location.href = "index.html";
}
</script>

</body>
</html>
