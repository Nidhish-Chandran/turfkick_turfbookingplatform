<!DOCTYPE html>
<html>
<head>
<title>Owner Register</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#ff7e5f,#feb47b);
color:white;
}

.form-box{
background:rgba(255,255,255,0.15);
backdrop-filter: blur(15px);
padding:40px;
border-radius:20px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:20px;
background:white;
color:#ff7e5f;
font-weight:bold;
cursor:pointer;
}

a{
display:block;
margin-top:10px;
color:white;
font-size:13px;
}

</style>

</head>

<body>

<div class="form-box">

<h2>Owner Registration</h2>

<input type="text" placeholder="Owner Name">
<input type="email" placeholder="Email">
<input type="text" placeholder="Phone">
<input type="password" placeholder="Password">

<button>Register</button>

<a href="index.html">Back to Home</a>

</div>

</body>
</html>
