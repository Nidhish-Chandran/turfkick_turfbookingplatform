<!DOCTYPE html>
<html>
<head>
<title>TurfKick - User Registration</title>

<link rel="stylesheet" href="css/userreg.css">

</head>

<body>

<div class="wrapper">

<!-- LEFT IMAGE -->
<div class="left"></div>

<!-- RIGHT FORM -->
<div class="right">

<h2>User Registration</h2>

<form onsubmit="return validateForm()">

<input type="text" placeholder="Name" required>

<input type="text" placeholder="Phone or Email" required>

<input type="password" id="pass" placeholder="Create Password" required>

<input type="password" id="repass" placeholder="Retype Password" required>

<button type="submit">Register</button>

</form>

<div class="back" onclick="goBack()">← Back to Login</div>

</div>

</div>

<script>

function goBack(){
window.location.href = "index.html";
}

/* PASSWORD VALIDATION */
function validateForm(){
let p = document.getElementById("pass").value;
let rp = document.getElementById("repass").value;

if(p !== rp){
alert("Passwords do not match!");
return false;
}

if(p.length < 6){
alert("Password must be at least 6 characters");
return false;
}

return true;
}

</script>

</body>
</html>
